<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Title</title>
    <style>
        img{
            width: 250px;
            height: 250px;
        }
        body{
            text-transform: capitalize;
        }
    </style>
</head>
<body>
<script>
    let products = [

        {
            title: 'milk',
            price: 22,
            image: 'https://www.oldenburger-dairy.com/media/00/6c/e1/1737642194/11067_1l_3_5_410x410_full_cream_milk.png'
        },

    {
        title: 'juice',
        price: 27,
        image: 'https://images-na.ssl-images-amazon.com/images/I/61jL2GCuKLL._SX679_PIbundle-24,TopRight,0,0_AA679SH20_.jpg'
    },

    {
        title: 'tomato',
        price: 47,
        image: 'https://dictionary.cambridge.org/ru/images/thumb/tomato_noun_001_17860.jpg?version=5.0.74'
    },

    {
        title: 'tea',
        price: 15,
        image: 'https://images.silpo.ua/products/500x500/01349a5c-6b58-411a-9261-94ab73ec9c19.png'
    },

    ];

    for (let i=0; i<products.length;i++){
        document.write('' +
            `<div class="product-card"> <h3 class="product-title"> ${products[i].title}. Price - ${products[i].price} </h3> <img src=${products[i].image} alt="" class="product-image"> </div>`);
    }
</script>
</body>
</html>
